<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ไม่พบหน้านี้ — คัมภีร์ดวง</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;600&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a10;color:#f0ede6;font-family:'Sarabun',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.star{font-size:64px;margin-bottom:1.5rem;opacity:.8}
h1{font-family:'Noto Serif Thai',serif;font-size:clamp(22px,5vw,32px);font-weight:600;margin-bottom:.75rem;color:#c9a84c}
p{font-size:15px;color:#8a8898;margin-bottom:2rem;line-height:1.7}
.btn-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:11px 24px;border-radius:30px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s}
.btn-primary{background:#c9a84c;color:#0a0a10;border:none}
.btn-primary:hover{background:#e8c97a}
.btn-secondary{background:transparent;color:#8a8898;border:1px solid rgba(255,255,255,0.15)}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.tools{margin-top:3rem;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:320px}
.tool-link{padding:10px 14px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:#12121a;color:#8a8898;text-decoration:none;font-size:13px;transition:all .2s}
.tool-link:hover{border-color:#c9a84c;color:#c9a84c}
</style>
</head>
<body>

<div class="star">🔮</div>
<h1>ดวงพาหลง — ไม่พบหน้านี้</h1>
<p>หน้าที่คุณตามหาอาจถูกย้ายหรือไม่มีอยู่แล้ว<br>ลองกลับไปหน้าแรกหรือใช้ tool ดูดวงด้านล่างครับ</p>

<div class="btn-grid">
  <a href="/" class="btn btn-primary">⭐ กลับหน้าแรก</a>
  <a href="javascript:history.back()" class="btn btn-secondary">← ย้อนกลับ</a>
</div>

<div class="tools">
  <a href="/สีเสื้อมงคล/tool.html" class="tool-link">🎨 สีเสื้อมงคล</a>
  <a href="/เบอร์มงคล/tool.html" class="tool-link">📱 เบอร์มงคล</a>
  <a href="/ดูดวง/tool.html" class="tool-link">🔮 ดูดวงวันเกิด</a>
  <a href="/ชื่อมงคล/tool.html" class="tool-link">✨ ชื่อมงคล</a>
</div>

</body>
</html>
